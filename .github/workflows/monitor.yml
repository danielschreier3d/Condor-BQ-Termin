name: CondorWatch

# Läuft alle 5 Minuten (Minimum für GitHub Actions). Außerdem manuell
# auslösbar über die Actions-UI ("workflow_dispatch").
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

# Wir brauchen Schreibrechte, damit der Job die aktualisierte SQLite-DB
# zurück ins Repo committen kann (Persistenz zwischen Läufen).
permissions:
  contents: write

# Nur ein Lauf gleichzeitig – verhindert Push-Konflikte beim DB-Commit.
concurrency:
  group: condorwatch
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Wir brauchen den vollen Verlauf, um sauber pushen zu können.
          fetch-depth: 0
          # Standard-Token erlaubt Push auf den eigenen Branch.
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run monitor
        env:
          TARGET_URL:    ${{ secrets.TARGET_URL }}
          SMTP_HOST:     ${{ secrets.SMTP_HOST }}
          SMTP_PORT:     ${{ secrets.SMTP_PORT }}
          SMTP_USE_TLS:  ${{ secrets.SMTP_USE_TLS }}
          SMTP_USER:     ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          NOTIFY_FROM:   ${{ secrets.NOTIFY_FROM }}
          NOTIFY_TO:     ${{ secrets.NOTIFY_TO }}
          DRY_RUN:       ${{ vars.DRY_RUN || 'false' }}
          LOG_LEVEL:     ${{ vars.LOG_LEVEL || 'INFO' }}
        run: python -m src.main

      - name: Persist SQLite database
        # Nur committen, wenn sich tatsächlich etwas geändert hat.
        run: |
          git config user.name  "condorwatch-bot"
          git config user.email "condorwatch-bot@users.noreply.github.com"
          git add data/appointments.sqlite || true
          if git diff --cached --quiet; then
            echo "Keine DB-Änderungen zu committen."
          else
            git commit -m "chore(data): update appointments db [skip ci]"
            # Mehrere Läufe können parallel sein -> rebase und retry.
            for i in 1 2 3; do
              git pull --rebase --autostash && git push && break
              echo "Push fehlgeschlagen, retry $i/3"
              sleep $((RANDOM % 10 + 5))
            done
          fi
